<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL WILL | Secure Your Legacy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #0f172a; --accent: #3b82f6; --danger: #ef4444;
            --success: #22c55e; --bg: #f1f5f9; --card: #ffffff;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background: var(--primary); color: white; padding: 1rem; text-align: center; font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        
        .card { background: var(--card); border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 2rem; margin-bottom: 2rem; }
        h2 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .category-icon { font-size: 1.2rem; color: var(--accent); }
        .btn { cursor: pointer; border: none; border-radius: 10px; padding: 12px 24px; font-weight: 600; transition: 0.3s; width: 100%; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); margin-top: 10px; }

        .badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .hidden { display: none; }
        .emergency-qr { text-align: center; padding: 1rem; border: 2px dashed #cbd5e1; border-radius: 10px; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="navbar">DIGITAL WILL</div>

<div class="container">
    <div id="setup-section">
        <div class="card">
            <h2><i class="fa-solid fa-shield-halved category-icon"></i> ১. সিকিউরিটি সেটআপ (Security)</h2>
            <div class="input-group">
                <label>মাস্টার কি (Master Key - Never Lose This):</label>
                <input type="password" id="masterKey" placeholder="আপনার ভল্ট আনলক করার গোপন পাসওয়ার্ড">
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-vault category-icon"></i> ২. স্মার্ট ভল্ট ক্যাটাগরি (Smart Vault)</h2>
            <div class="grid">
                <div class="input-group">
                    <label><i class="fa-solid fa-building-columns"></i> Financial (Bank, PIN):</label>
                    <textarea id="vaultFinancial" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-key"></i> Digital Assets (Crypto, Social):</label>
                    <textarea id="vaultDigital" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-heart"></i> Memories (Personal Message):</label>
                    <textarea id="vaultMemories" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label><i class="fa-solid fa-file-contract"></i> Legal Documents:</label>
                    <textarea id="vaultLegal" rows="3"></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-users category-icon"></i> ৩. মাল্টি-লেয়ার ট্রিগার (Triggers)</h2>
            <div class="input-group">
                <label>বেনিফিশিয়ারি ইমেইল (Beneficiary Email):</label>
                <input type="email" id="beneficiaryEmail" placeholder="উত্তরাধিকারীর ইমেইল">
            </div>
            <div class="input-group">
                <label>সোশ্যাল ভ্যালিডেশন (Guardians):</label>
                <input type="text" id="guardians" placeholder="২-৩ জন বন্ধুর নাম/ইমেইল (কমা দিয়ে লিখুন)">
            </div>
            <div class="input-group">
                <label>চেক-ইন পিরিয়ড (Heartbeat):</label>
                <select id="duration">
                    <option value="30">৩০ দিন পর অটো-ট্রিগার</option>
                    <option value="90">৯০ দিন পর অটো-ট্রিগার</option>
                    <option value="365">১ বছর পর অটো-ট্রিগার</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="lockVault()">ভল্ট এনক্রিপ্ট ও সেভ করুন</button>
        </div>
    </div>

    <div id="active-section" class="hidden text-center">
        <div class="card">
            <h2 style="justify-content: center;"><i class="fa-solid fa-circle-check" style="color: var(--success);"></i> ভল্ট সুরক্ষিত আছে</h2>
            <p id="countdownDisplay" style="font-size: 1.2rem; font-weight: bold;"></p>
            <button class="btn btn-primary" onclick="checkIn()">আমি সজাগ আছি (Daily Check-in)</button>
            
            <div class="emergency-qr">
                <p><i class="fa-solid fa-qrcode"></i> Emergency Access QR</p>
                <small>আপনার ফিজিক্যাল কার্ডের জন্য এই আইডি ব্যবহার করুন: <br><strong id="vaultID"></strong></small>
            </div>

            <button class="btn btn-outline" onclick="resetVault()" style="color: var(--danger); border-color: var(--danger);">ভল্ট ডিলিট করুন</button>
        </div>
    </div>
</div>

<script>
    function lockVault() {
        const key = document.getElementById('masterKey').value;
        if(key.length < 6) { alert("মাস্টার কি অন্তত ৬ অক্ষরের হতে হবে!"); return; }

        const vaultData = {
            fin: document.getElementById('vaultFinancial').value,
            dig: document.getElementById('vaultDigital').value,
            mem: document.getElementById('vaultMemories').value,
            leg: document.getElementById('vaultLegal').value,
        };

        const encrypted = CryptoJS.AES.encrypt(JSON.stringify(vaultData), key).toString();
        
        const config = {
            vault: encrypted,
            email: document.getElementById('beneficiaryEmail').value,
            guardians: document.getElementById('guardians').value,
            duration: document.getElementById('duration').value * 24 * 60 * 60 * 1000,
            lastActive: Date.now(),
            id: "DW-" + Math.random().toString(36).substr(2, 9).toUpperCase()
        };

        localStorage.setItem('digital_will_v1', JSON.stringify(config));
        alert("আপনার ডিজিটাল উইল সফলভাবে এনক্রিপ্ট করা হয়েছে।");
        renderUI();
    }

    function checkIn() {
        let config = JSON.parse(localStorage.getItem('digital_will_v1'));
        config.lastActive = Date.now();
        localStorage.setItem('digital_will_v1', JSON.stringify(config));
        alert("চেক-ইন সফল!");
        renderUI();
    }

    function renderUI() {
        const stored = localStorage.getItem('digital_will_v1');
        if(stored) {
            const config = JSON.parse(stored);
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('active-section').classList.remove('hidden');
            document.getElementById('vaultID').innerText = config.id;

            const expiry = config.lastActive + config.duration;
            const remaining = Math.ceil((expiry - Date.now()) / (1000 * 60 * 60 * 24));
            
            document.getElementById('countdownDisplay').innerText = remaining + " দিন বাকি (পরবর্তী ট্রিগার)";
            if(remaining <= 0) {
                document.getElementById('countdownDisplay').innerText = "ট্রিগার মোড সক্রিয়!";
                document.getElementById('countdownDisplay').style.color = "red";
            }
        }
    }

    function resetVault() {
        if(confirm("সতর্কবার্তা: আপনার সমস্ত ডেটা চিরতরে মুছে যাবে। আপনি কি নিশ্চিত?")) {
            localStorage.removeItem('digital_will_v1');
            location.reload();
        }
    }

    window.onload = renderUI;
</script>

</body>
</html>
