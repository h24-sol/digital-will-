<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL WILL | Secure Legacy Access</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --primary: #020617; --accent: #2563eb; --solana: #14f195; --glass: rgba(15, 23, 42, 0.98); --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: #020617; color: var(--text); margin: 0; }
        .nav { background: #0f172a; padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; color: white; text-decoration: none; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--glass); border-radius: 20px; padding: 2.5rem; border: 1px solid #1e293b; margin-bottom: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 1rem; color: var(--solana); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        input, textarea, select { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-solana { background: #9945ff; color: white; width: auto; font-size: 0.8rem; }
        .file-list { margin-top: 15px; padding: 15px; background: #020617; border-radius: 10px; border: 1px dashed #334155; font-size: 0.85rem; }
        .hidden { display: none; }
        .timer { font-size: 4.5rem; font-weight: 900; color: var(--solana); margin: 10px 0; }
    </style>
</head>
<body>

<div class="nav">
    <a href="#" class="logo"><i class="fa-solid fa-infinity"></i> DIGITAL WILL</a>
    <button class="btn btn-solana" id="walletBtn" onclick="connectSolana()">CONNECT WALLET</button>
</div>

<div class="container">
    
    <div id="setup-view">
        <div class="card">
            <h2><i class="fa-solid fa-user-shield"></i> 1. Security Keys</h2>
            <div class="grid">
                <input type="password" id="masterKey" placeholder="Legacy Master Key (8+ chars)">
                <input type="email" id="ownerEmail" placeholder="Your Email">
            </div>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-box-archive"></i> 2. Vault Content</h2>
            <textarea id="vaultData" rows="5" placeholder="Enter sensitive info (codes, phrases, etc)"></textarea>
            <input type="file" id="fileInput" multiple onchange="handleFiles(this.files)" style="margin-top:15px;">
            <div id="fileStatus" class="file-list hidden"></div>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-bolt"></i> 3. Trigger Policy</h2>
            <div class="grid">
                <select id="triggerTime">
                    <option value="0.0014">2 Minutes (TEST)</option>
                    <option value="30">30 Days</option>
                    <option value="365">1 Year</option>
                </select>
                <input type="email" id="nomineeEmail" placeholder="Nominee Email">
            </div>
            <button class="btn btn-primary" style="margin-top:25px;" id="sealBtn" onclick="sealVault()">SEAL WILL</button>
        </div>
    </div>

    <div id="active-view" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="color: var(--solana); font-weight: 800;">HEARTBEAT MONITORING</div>
            <div id="timerDisplay" class="timer">--</div>
            <button class="btn btn-primary" onclick="checkIn()"><i class="fa-solid fa-heart"></i> I AM ALIVE</button>
            <button class="btn" style="background:transparent; color:#64748b; margin-top:20px;" onclick="wipe()">WIPE ALL DATA</button>
        </div>
    </div>

    <div id="portal-view" class="hidden">
        <div class="card">
            <h2 style="color: var(--accent);"><i class="fa-solid fa-key"></i> Nominee Access</h2>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom:20px;">Verification required. Enter the Master Key to unlock.</p>
            <input type="password" id="unlockKey" placeholder="Master Key" style="margin-bottom:15px; border-color:var(--accent);">
            <button class="btn btn-primary" onclick="unlock()">DECRYPT VAULT</button>
            <div id="results" class="hidden" style="margin-top:30px; border-top:1px solid #334155; padding-top:20px;">
                <div id="textResult" style="white-space:pre-wrap; background:#020617; padding:20px; border-radius:12px; font-family:monospace;"></div>
                <div id="fileLinks" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = { PUBLIC: "UjQcyAneLY2BmOV1Z", SERVICE: "service_andok0r", TEMPLATE: "template_3xoxzb9" };
    emailjs.init(API.PUBLIC);
    let stagedFiles = [];

    async function connectSolana() {
        if (window.solana) {
            const resp = await window.solana.connect();
            document.getElementById('walletBtn').innerText = "CONNECTED";
        }
    }

    function handleFiles(fList) {
        stagedFiles = [];
        const status = document.getElementById('fileStatus');
        status.innerHTML = "<strong>Staging Files...</strong>";
        status.classList.remove('hidden');
        
        Array.from(fList).forEach(f => {
            const r = new FileReader();
            r.onload = (e) => { 
                stagedFiles.push({ name: f.name, data: e.target.result });
                status.innerHTML = `<strong>Ready:</strong> ${stagedFiles.length} files`;
            };
            r.readAsDataURL(f);
        });
    }

    function sealVault() {
        const key = document.getElementById('masterKey').value;
        const nominee = document.getElementById('nomineeEmail').value;
        const content = document.getElementById('vaultData').value;

        if(key.length < 8) return alert("Error: Master Key must be at least 8 characters.");
        if(!nominee) return alert("Error: Nominee email is required.");

        try {
            const dataToEncrypt = JSON.stringify({ content, attachments: stagedFiles });
            const encrypted = CryptoJS.AES.encrypt(dataToEncrypt, key).toString();
            
            const vault = {
                payload: encrypted,
                nominee: nominee,
                owner: document.getElementById('ownerEmail').value,
                limit: parseFloat(document.getElementById('triggerTime').value) * 86400000,
                last: Date.now(),
                sent: false
            };
            
            localStorage.setItem('dw_v8', JSON.stringify(vault));
            render();
        } catch (e) {
            alert("Encryption failed. Try with fewer/smaller files.");
            console.error(e);
        }
    }

    function render() {
        const params = new URLSearchParams(window.location.search);
        const stored = localStorage.getItem('dw_v8');

        if (params.get('mode') === 'nominee') {
            show('portal-view'); return;
        }

        if (!stored) {
            show('setup-view'); return;
        }

        const v = JSON.parse(stored);
        const remaining = (v.last + v.limit) - Date.now();

        if (remaining <= 0) {
            show('portal-view');
            if (!v.sent) trigger(v);
        } else {
            show('active-view');
            const mins = Math.ceil(remaining / 60000);
            document.getElementById('timerDisplay').innerText = v.limit < 3600000 ? mins + "m" : Math.ceil(mins/1440) + "d";
        }
    }

    function show(id) {
        ['setup-view', 'active-view', 'portal-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function trigger(v) {
        v.sent = true;
        localStorage.setItem('dw_v8', JSON.stringify(v));
        const link = window.location.origin + window.location.pathname + "?mode=nominee";
        
        emailjs.send(API.SERVICE, API.TEMPLATE, {
            beneficiary_email: v.nominee,
            message: "HEARTBEAT EXPIRED. Access the legacy vault here: " + link
        }).then(() => alert("Notification sent to nominee."));
    }

    function unlock() {
        const key = document.getElementById('unlockKey').value;
        const v = JSON.parse(localStorage.getItem('dw_v8'));
        try {
            const bytes = CryptoJS.AES.decrypt(v.payload, key);
            const dec = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('textResult').innerText = dec.content;
            const linkBox = document.getElementById('fileLinks');
            linkBox.innerHTML = "";
            dec.attachments.forEach(a => {
                linkBox.innerHTML += `<a href="${a.data}" download="${a.name}" style="display:block; color:var(--solana); margin-top:10px;">💾 Download ${a.name}</a>`;
            });
        } catch (e) { alert("Invalid Key."); }
    }

    function checkIn() {
        let v = JSON.parse(localStorage.getItem('dw_v8'));
        v.last = Date.now(); v.sent = false;
        localStorage.setItem('dw_v8', JSON.stringify(v));
        render();
    }

    function wipe() { if(confirm("Permanently delete vault?")) { localStorage.clear(); location.reload(); } }

    window.onload = render;
    setInterval(render, 30000);
</script>
</body>
</html>
