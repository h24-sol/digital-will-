<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL WILL | Secure & Viewable Vault</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --solana: #14F195; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; }
        .navbar { background: var(--primary); color: white; padding: 1.5rem; text-align: center; font-size: 1.5rem; font-weight: bold; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-unlock { background: var(--primary); color: white; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        .hidden { display: none; }
        .preview-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); }
        .asset-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="navbar">DIGITAL WILL PRO</div>

<div class="container">
    
    <div id="setup-section">
        <div class="card">
            <h2><i class="fa-solid fa-user-shield"></i> ১. ভল্ট সেটিংস</h2>
            <input type="password" id="masterKey" placeholder="মাস্টার পাসওয়ার্ড (এটিই চাবিকাঠি)">
            <input type="email" id="beneficiaryEmail" placeholder="উত্তরাধিকারীর ইমেইল" style="margin-top: 10px;">
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-cloud-arrow-up"></i> ২. ফাইল ও ডকুমেন্টস</h2>
            <input type="file" id="fileInput" multiple onchange="processFiles(this.files)">
            <div id="fileStatus" style="font-size: 0.8rem; margin-top: 10px; color: #64748b;"></div>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-file-invoice"></i> ৩. গোপন তথ্য</h2>
            <textarea id="secretNotes" rows="4" placeholder="আপনার ব্যাংক পাসওয়ার্ড বা জরুরি নোট এখানে লিখুন..."></textarea>
            <button class="btn btn-primary" onclick="lockAndSave()">এনক্রিপ্ট এবং লক করুন</button>
        </div>
    </div>

    <div id="active-section" class="hidden">
        <div class="card" style="text-align: center;">
            <h2 style="justify-content: center; color: green;"><i class="fa-solid fa-circle-check"></i> ভল্টটি বর্তমানে সুরক্ষিত</h2>
            <p id="vaultStatusText"></p>
            <button class="btn btn-primary" onclick="checkIn()">আমি সজাগ আছি (Check-In)</button>
            <hr>
            <p style="font-size: 0.9rem;">ভল্টের ভেতর কী আছে দেখতে চান?</p>
            <input type="password" id="unlockKey" placeholder="মাস্টার পাসওয়ার্ড দিন">
            <button class="btn btn-unlock" onclick="unlockVault()">ভল্ট আনলক করে দেখুন</button>
            
            <div id="preview-area" class="hidden">
                <div class="preview-box">
                    <h3><i class="fa-solid fa-eye"></i> ভল্ট কন্টেন্ট:</h3>
                    <p><strong>গোপন নোট:</strong> <span id="viewNotes"></span></p>
                    <div id="viewFiles"></div>
                </div>
            </div>

            <button class="btn" style="background: #fee2e2; color: #dc2626; margin-top: 20px;" onclick="resetVault()">ভল্ট ডিলিট করুন</button>
        </div>
    </div>

</div>

<script>
    let tempFiles = [];

    // ফাইলগুলোকে মেমরিতে নেওয়া
    function processFiles(files) {
        tempFiles = [];
        document.getElementById('fileStatus').innerHTML = "প্রসেসিং হচ্ছে...";
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempFiles.push({ name: file.name, type: file.type, data: e.target.result });
                document.getElementById('fileStatus').innerHTML += `<div>✅ ${file.name} রেডি।</div>`;
            };
            reader.readAsDataURL(file);
        }
    }

    // এনক্রিপ্ট করে সেভ করা
    function lockAndSave() {
        const key = document.getElementById('masterKey').value;
        const email = document.getElementById('beneficiaryEmail').value;
        const notes = document.getElementById('secretNotes').value;

        if(!key || !email) { alert("পাসওয়ার্ড এবং ইমেইল দিন!"); return; }

        const vaultData = { notes: notes, files: tempFiles };
        const encrypted = CryptoJS.AES.encrypt(JSON.stringify(vaultData), key).toString();

        const config = {
            payload: encrypted,
            beneficiary: email,
            lastSeen: Date.now(),
            interval: 30 * 24 * 60 * 60 * 1000 // ৩০ দিন
        };

        localStorage.setItem('digital_will_v2', JSON.stringify(config));
        alert("ভল্ট লক করা হয়েছে!");
        render();
    }

    // ভল্ট আনলক করে দেখা
    function unlockVault() {
        const key = document.getElementById('unlockKey').value;
        const stored = JSON.parse(localStorage.getItem('digital_will_v2'));

        try {
            const bytes = CryptoJS.AES.decrypt(stored.payload, key);
            const decryptedData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

            // শো ডেটা
            document.getElementById('preview-area').classList.remove('hidden');
            document.getElementById('viewNotes').innerText = decryptedData.notes;
            
            const fileContainer = document.getElementById('viewFiles');
            fileContainer.innerHTML = "<strong>সংরক্ষিত ফাইল:</strong>";
            decryptedData.files.forEach(f => {
                fileContainer.innerHTML += `
                    <div class="asset-item">
                        <i class="fa-solid fa-file"></i> 
                        <a href="${f.data}" target="_blank">${f.name}</a> (ক্লিক করে দেখুন)
                    </div>`;
            });
        } catch (e) {
            alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
        }
    }

    function render() {
        const stored = localStorage.getItem('digital_will_v2');
        if(stored) {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('active-section').classList.remove('hidden');
            const data = JSON.parse(stored);
            const daysLeft = Math.ceil(((data.lastSeen + data.interval) - Date.now()) / (1000 * 60 * 60 * 24));
            document.getElementById('vaultStatusText').innerText = `পরবর্তী চেক-ইন ${daysLeft} দিনের মধ্যে করতে হবে।`;
        }
    }

    function checkIn() {
        let data = JSON.parse(localStorage.getItem('digital_will_v2'));
        data.lastSeen = Date.now();
        localStorage.setItem('digital_will_v2', JSON.stringify(data));
        alert("চেক-ইন সফল!");
        render();
    }

    function resetVault() {
        if(confirm("সব ফাইল মুছে যাবে। নিশ্চিত?")) {
            localStorage.removeItem('digital_will_v2');
            location.reload();
        }
    }

    window.onload = render;
</script>

</body>
</html>
